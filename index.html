  ActiveCampaign integration
  --------------------------
  Form-ID 49 on acupofambition.activehosted.com pushes contacts into Britt's
  AC list with the outcome stored in custom field 184 ("Beslisboom Uitslag").
  Hook an AC automation onto "Submits form" → branch on field[184] to send
  the right follow-up mail.

<div id="beslisboom-root"></div>

<style>
  #beslisboom-root {
    --acoa-bg: #fdf8f4;
    --acoa-card: #ffffff;
    --acoa-ink: #2a1411;

    --acoa-accent: #5c1f1a;          /* deep burgundy from logo */

    --acoa-shadow: 0 10px 40px rgba(42, 20, 17, 0.08);

    font-size: 17px;
  }
  #beslisboom-root *,
  #beslisboom-root *::before,
  #beslisboom-root *::after { box-sizing: border-box; }

  .bb-logo {
    display: block;
    max-width: 220px;
    width: 60%;
    height: auto;
    margin: 0 auto 28px;
  }

  /* ---------- Intro screen ---------- */
  .bb-intro {
    text-align: center;
    animation: bbFade 320ms ease both;
  }
  .bb-intro__photo {
    display: block;
    width: 100%;
    max-width: 360px;
    height: auto;
    border-radius: var(--acoa-radius);
    margin: 0 auto 24px;
    box-shadow: var(--acoa-shadow);
  }
  .bb-intro__hi {
    font-size: 17px;
    font-weight: 400;
    color: var(--acoa-ink);
    margin: 0 0 14px;
    text-align: left;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }
  .bb-framing {
    max-width: 760px;
    margin: 0 auto 18px;
    color: var(--acoa-muted);
    font-size: 16px;
    line-height: 1.6;
    text-align: center;
    padding: 0 4px;
  }
  .bb-intro__body {
    text-align: left;
    color: #2c2620;
    font-size: 17px;
    line-height: 1.65;
    max-width: 600px;
    margin: 0 auto 28px;
  }
  .bb-intro__body p { margin: 0 0 14px; }
  .bb-intro__body strong { color: var(--acoa-accent); }
  .bb-intro__hook {
    font-size: clamp(22px, 4vw, 28px);
    font-weight: 800;
    color: var(--acoa-accent);
    margin: 8px 0 8px;
    line-height: 1.2;
  }
  .bb-intro__sub {
    color: var(--acoa-muted);
    font-size: 17px;
    margin: 0 0 28px;
  }
  .bb-intro__start {
    appearance: none;
    background: var(--acoa-accent);
    color: #fff;
    font: inherit;
    font-weight: 700;
    font-size: 18px;
    border: 0;
    border-radius: 12px;
    padding: 18px 32px;
    cursor: pointer;
    transition: background 120ms ease, transform 120ms ease;
    margin-bottom: 36px;
  }
  .bb-intro__start:hover {
    background: var(--acoa-accent-dark);
    transform: translateY(-1px);
  }

  .bb-progress {
    height: 6px;
    background: var(--acoa-soft);
    border-radius: 999px;
    overflow: hidden;
    margin-bottom: 28px;
  }
  .bb-progress__bar {
    height: 100%;
    width: 0%;
    background: var(--acoa-accent);
    transition: width 360ms cubic-bezier(.2,.7,.2,1);
  }

  .bb-card {
    background: var(--acoa-card);
    border: 1px solid var(--acoa-border);
    border-radius: var(--acoa-radius);
    box-shadow: var(--acoa-shadow);
    padding: 32px 24px;
    animation: bbFade 320ms ease both;
  }
  @keyframes bbFade {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .bb-eyebrow {
    text-transform: uppercase;
    letter-spacing: 0.16em;
    font-size: 13px;
    font-weight: 700;
    color: var(--acoa-gold);
    margin-bottom: 14px;
  }
  .bb-question {
    font-size: clamp(22px, 4.4vw, 28px);
    font-weight: 700;
    line-height: 1.25;
    margin: 0 0 10px;
    color: var(--acoa-accent);
  }
  .bb-helper {
    color: var(--acoa-muted);
    font-size: 17px;
    margin: 0 0 28px;
  }

  .bb-answers {
    display: grid;
    gap: 14px;
  }
  .bb-answer {
    appearance: none;
    -webkit-appearance: none;
    background: #fff;
    border: 1.5px solid var(--acoa-border);
    border-radius: 14px;
    padding: 18px 20px;
    text-align: left;
    font: inherit;
    font-size: 17px;
    font-weight: 600;
    color: var(--acoa-ink);
    cursor: pointer;
    transition: transform 120ms ease, border-color 120ms ease, background 120ms ease, color 120ms ease;
  }
  .bb-answer:hover, .bb-answer:focus-visible {
    outline: none;
    border-color: var(--acoa-accent);
    color: var(--acoa-accent);
    transform: translateY(-1px);
    background: #fffaf7;
  }

  .bb-back {
    appearance: none;
    background: none;
    border: 0;
    color: var(--acoa-muted);
    font: inherit;
    font-size: 14px;
    margin-top: 18px;
    cursor: pointer;
    padding: 4px 0;
  }
  .bb-back:hover { color: var(--acoa-accent); }

  /* ---------- Email gate ---------- */
  .bb-gate__title {
    font-size: clamp(22px, 3.6vw, 28px);
    margin: 0 0 8px;
    font-weight: 800;
    line-height: 1.2;
  }
  .bb-gate__intro {
    color: var(--acoa-muted);

  .bb-field {

  .bb-field label {

  }
  .bb-field input {
    font: inherit; font-size: 17px;
    padding: 15px 16px;

  .bb-consent {

  .bb-submit {

    background: var(--acoa-accent);

    font: inherit;
    font-weight: 700;
    font-size: 16px;

  .bb-error {
    color: #c44a4a; font-size: 14px; margin-top: 10px; min-height: 1em;
  }
  .bb-privacy {
    margin: 12px 0 0;
    font-size: 13px;
    color: var(--acoa-muted);
    text-align: center;
    line-height: 1.4;
  }

  /* ---------- Result ---------- */
  .bb-result__badge {
    display: inline-block;
    background: var(--acoa-soft);
    color: var(--acoa-accent-dark);
    padding: 6px 12px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    margin-bottom: 16px;
  }
  .bb-result__title {
    font-size: clamp(28px, 5vw, 40px);
    line-height: 1.1;
    margin: 0 0 18px;
    font-weight: 800;
  }
  .bb-result__body p { margin: 0 0 14px; color: #2c2620; }
  .bb-result__body strong { color: var(--acoa-ink); }
  .bb-result__body a { color: var(--acoa-accent); text-decoration: underline; }
  .bb-result__body a:hover { color: var(--acoa-accent-dark); }
  .bb-result__cta {
    display: inline-block;
    background: var(--acoa-accent);
    color: #fff;
    text-decoration: none;
    padding: 14px 22px;
    border-radius: 12px;
    font-weight: 700;
    margin-top: 18px;
    margin-right: 8px;
    transition: background 120ms ease;
  }
  .bb-result__cta:hover { background: var(--acoa-accent-dark); }
  .bb-result__cta--ghost {
    background: transparent;
    color: var(--acoa-accent-dark);
    border: 1.5px solid var(--acoa-accent);
  }
  .bb-result__cta--ghost:hover {
    background: var(--acoa-soft);
  }
  .bb-result__list {
    margin: 8px 0 0;
    padding-left: 20px;
    color: #2c2620;
  }
  .bb-result__list li { margin-bottom: 12px; line-height: 1.55; }
  .bb-result__list a {
    color: var(--acoa-accent);
    text-decoration: none;
    font-weight: 600;
    border-bottom: 1.5px solid var(--acoa-soft);
    transition: border-color 120ms ease;
  }
  .bb-result__list a:hover { border-bottom-color: var(--acoa-accent); }
  .bb-result__lead {
    background: var(--acoa-soft);
    border-left: 3px solid var(--acoa-gold);
    padding: 14px 16px;
    border-radius: 8px;
    margin: 18px 0 4px;
    font-size: 16px;
  }
  .bb-result__lead strong { color: var(--acoa-accent); }

  .bb-confetti {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 9999;
    width: 100%;
    height: 100%;
  }
  .bb-restart {
    display: block;
    margin-top: 28px;
    background: none; border: 0;
    color: var(--acoa-muted);
    text-decoration: underline;
    cursor: pointer;
    font: inherit;
    font-size: 14px;
  }

  @media (max-width: 480px) {
    #beslisboom-root { padding: 18px 14px 56px; font-size: 17px; }
    .bb-card { padding: 26px 20px; }
    .bb-logo { max-width: 180px; margin-bottom: 22px; }
    .bb-question { font-size: 22px; }
    .bb-helper { font-size: 16px; }
    .bb-answer { font-size: 17px; padding: 18px 18px; }
    .bb-result__title { font-size: 28px; }
    .bb-gate__title { font-size: 22px; }
    .bb-result__cta { display: block; text-align: center; margin: 12px 0 0; }
    .bb-intro__hi { font-size: 16px; }
    .bb-intro__body { font-size: 16px; }
    .bb-intro__hook { font-size: 22px; }
    .bb-intro__start { width: 100%; padding: 18px 24px; font-size: 17px; }
    .bb-intro__photo { max-width: 240px; margin-bottom: 18px; }
    .bb-framing { font-size: 15px; }
  }
</style>

<script>
(function () {
  // ====================================================================
  // CONFIG — ActiveCampaign integration
  // ====================================================================
  // Form: "Beslisboom — Ben ik klaar om betaald spreker te worden?"
  // Custom field: field[184] = Beslisboom Uitslag (klaar / werk-aan-de-winkel / nog-niet-klaar)
  var AC_ENDPOINT = 'https://acupofambition.activehosted.com/proc.php?jsonp=true';
  var AC_FORM = {
    u: '49',
    f: '49',
    s: '',
    c: '0',
    m: '0',
    act: 'sub',
    v: '2',
    or: '8c06a683-930f-4d72-8483-958921b8188b'
  };
  var AC_OUTCOME_FIELD = 'field[184]';
  // Set to false to skip the email step entirely (debugging only):
  var REQUIRE_EMAIL = true;

  // ====================================================================
  // Decision tree
  // ====================================================================
  // Each node is a question. Answers route to another nodeId or "result:<id>".
  var TREE = {
    start: 'q1',
    nodes: {
      q1: {
        question: 'Heb je inzichten of ervaringen die waardevol zijn voor publiek?',
        helper: 'Denk aan kennis, ervaringen of een visie waar anderen iets aan hebben.',

          { label: 'Dat weet ik niet zeker', tone: 'maybe', next: 'q_explore' }
        ]
      },
      q2: {
        question: 'Is er vraag naar jouw onderwerp?',
        helper: 'Wordt er door bedrijven, events of organisaties actief naar dit thema gezocht?',
        answers: [
          { label: 'Ja',                  tone: 'yes',   next: 'q3' },
          { label: 'Dat weet ik niet zeker', tone: 'maybe', next: 'q_explore' }
        ]
      },
      q3: {
        question: 'Heb je een keynote of presentatie uitgewerkt?',
        helper: 'Een verhaal met een duidelijke opbouw, kernboodschap en take-aways.',
        answers: [
          { label: 'Ja',  tone: 'yes', next: 'q4' },
          { label: 'Nee', tone: 'no',  next: 'q_invest' }
        ]
      },
      q4: {
        question: 'Kun je dit met plezier en zelfvertrouwen overbrengen?',
        helper: 'Sta je krachtig op het podium en geniet je van het moment?',
        answers: [
          { label: 'Ja',  tone: 'yes', next: 'q5' },
          { label: 'Nee', tone: 'no',  next: 'q_invest' }
        ]
      },
      q5: {
        question: 'Heb je ervaring op het podium en bewijs van waarde?',
        helper: 'Testimonials, beeldmateriaal van eerdere keynotes of betaalde optredens.',
        answers: [
          { label: 'Ja',  tone: 'yes', next: 'q6' },
          { label: 'Nee', tone: 'no',  next: 'q_invest' }
        ]
      },
      q6: {
        question: 'Ben je zichtbaar en vindbaar als spreker?',
        helper: 'En ben je consistent bereid om hierin te blijven investeren?',
        answers: [
          { label: 'Ja',  tone: 'yes', next: 'result:ready' },
          { label: 'Nee', tone: 'no',  next: 'q_invest' }
        ]
      },
      q_explore: {
        question: 'Ben je bereid om te onderzoeken wat jouw unieke verhaal is?',
        helper: 'We hebben allemaal waardevolle kennis waar we anderen mee vooruit kunnen helpen — vaak is het alleen nog niet scherp.',
        answers: [
          { label: 'Ja',  tone: 'yes', next: 'q_invest' },
          { label: 'Nee', tone: 'no',  next: 'result:not_ready' }
        ]
      },
      q_invest: {
        question: 'Ben je bereid om hierin te investeren?',
        helper: 'In tijd, in jezelf, en eventueel in begeleiding om de stap te zetten.',
        answers: [
          { label: 'Ja',  tone: 'yes', next: 'result:work' },
          { label: 'Nee', tone: 'no',  next: 'result:not_ready' }
        ]
      }
    }
  };

  var RESULTS = {
    ready: {
      tag: 'klaar',
      badge: 'Goed nieuws',
      title: 'Je bent er klaar voor! 🎤',
      body: [
        'Jouw verhaal staat, je staat met plezier op het podium en je investeert consistent in je zichtbaarheid.',
        'Het is nodig dat veel meer vrouwen het podium gaan beklimmen — welk podium dat ook is! Daarom runnen wij — naast A Cup of Ambition — ook <a href="https://www.vrouwelijkespreker.nu" target="_blank" rel="noopener"><strong>vrouwelijkespreker.nu</strong></a> en <a href="https://www.vrouwelijkedagvoorzitter.nu" target="_blank" rel="noopener"><strong>vrouwelijkedagvoorzitter.nu</strong></a>, zodat meer vrouwen de kans krijgen zichzelf te profileren als betaald spreker.',
        'Om vindbaar te zijn als spreker via deze website werken we met een betaald model. Voor <strong>€199,- per jaar (excl. btw)</strong> plaatsen we jouw foto en een korte omschrijving op de homepagina, en krijg je een unieke URL met jouw sprekersprofiel.',
        'Wil je meer informatie of je direct aanmelden?'
      ],
      ctas: [
        { label: 'Aanmelden als spreker', href: 'https://www.vrouwelijkespreker.nu/aanmelden-als-spreker', primary: true },
        { label: 'Terug naar A Cup of Ambition', href: 'https://www.acupofambition.nl', primary: false }
      ]
    },
    work: {
      tag: 'werk-aan-de-winkel',
      badge: 'Bijna zover',
      title: "Let's go — er is werk aan de winkel.",
      body: [
        'Jij hebt de motivatie en ambitie om serieus met je sprekersskills en positionering aan de slag te gaan. Dat is super, want <strong>MORE WOMEN ON STAGE</strong> bereiken we niet zomaar.',
        'Wij van A Cup of Ambition helpen je graag verder. Samen met ons werk je aan je verhaal, je sprekersvaardigheden en je positionering. Dat kan via onderstaande mogelijkheden:'
      ],
      list: [
        '<strong>Doe mee met de Sprekersopleiding</strong> — hier werk je aan jouw sprekerskills en zelfvertrouwen én je ontdekt waar jouw unieke verhaal zit. We starten binnenkort weer. <a href="https://www.acupofambition.nl/opleiding" target="_blank" rel="noopener">Meer info →</a>',
        '<strong>In het LEVEL UP traject</strong> leren wij je alle facetten die nodig zijn om de stap naar betaald spreker te maken. Van positionering op LinkedIn tot vaker in de media komen. <a href="https://www.acupofambition.nl/alle-trainingen1" target="_blank" rel="noopener">Meer info →</a>',
        '<strong>Of schakel ons in voor een 1:1 coachtraject</strong> om samen jouw keynote te ontwikkelen én verkoopklaar te maken — bouw met ons je killer keynote. <a href="https://www.acupofambition.nl/11-coaching" target="_blank" rel="noopener">Meer info →</a>'
      ],
      // CTAs are dynamically tailored based on the first "gap" in the user's
      // answers — see buildTailoredCtas() below. Falls back to a generic CTA.
      ctas: [
        { label: 'Bekijk de opleidingen', href: 'https://www.acupofambition.nl', primary: true }
      ]
    },
    not_ready: {
      tag: 'nog-niet-klaar',
      badge: 'Nog even geduld',
      title: 'Je bent er nog niet klaar voor.',
      body: [
        'Betaald spreker word én ben je niet zomaar. Spreken en presenteren is een vak — professionele sprekers stoppen hun ziel en zaligheid in hun keynotes en positionering. Dat vergt tijd, zichtbaarheid, focus op je positionering en regelmatige trainingen om jezelf te blijven ontwikkelen.',
        'Jij gaf aan dat je hier nu nog niet in wilt investeren. Onze eerlijke mening? <strong>Dat is wel nodig.</strong>',
        'Mocht je later toch de stap willen zetten: wij staan klaar om je daarbij te helpen. Hoe?'
      ],
      list: [
        '<strong>Doe mee met de Sprekersopleiding</strong> — werk aan jouw sprekerskills en zelfvertrouwen én ontdek waar jouw unieke verhaal zit. <a href="https://www.acupofambition.nl/opleiding" target="_blank" rel="noopener">Meer info →</a>',
        '<strong>In het LEVEL UP traject</strong> leren wij je alle facetten die nodig zijn om de stap naar betaald spreker te maken — van positionering op LinkedIn tot vaker in de media komen. <a href="https://www.acupofambition.nl/alle-trainingen1" target="_blank" rel="noopener">Meer info →</a>',
        '<strong>Schakel ons in voor een 1:1 coachtraject</strong> — bouw met ons je killer keynote, verkoopklaar gemaakt. <a href="https://www.acupofambition.nl/11-coaching" target="_blank" rel="noopener">Meer info →</a>'
      ],
      ctas: [
        { label: 'Ontdek A Cup of Ambition', href: 'https://www.acupofambition.nl/alle-trainingen1', primary: true }
      ]
    }
  };

  // ====================================================================
  // State + render
  // ====================================================================
  var root = document.getElementById('beslisboom-root');
  var state = {
    started: false,       // false = show intro screen
    history: [],          // array of { nodeId, answerLabel }
    currentNodeId: TREE.start,
    pendingResult: null,  // result key once tree is finished, before email
    finalResult: null     // shown after email submitted (or skipped)
  };

  function totalDepth() {
    // approximate progress: longest path is ~7 (q1→q2→q3→q4→q5→q6→done)
    return 7;
  }

  function progressPct() {
    if (state.finalResult) return 100;
    if (state.pendingResult) return 95;
    return Math.min(90, (state.history.length / totalDepth()) * 90);
  }

  function el(tag, attrs, children) {
    var node = document.createElement(tag);
    if (attrs) Object.keys(attrs).forEach(function (k) {
      if (k === 'class') node.className = attrs[k];
      else if (k === 'html') node.innerHTML = attrs[k];
      else if (k.indexOf('on') === 0) node.addEventListener(k.slice(2), attrs[k]);
      else node.setAttribute(k, attrs[k]);
    });
    (children || []).forEach(function (c) {
      if (c == null) return;
      node.appendChild(typeof c === 'string' ? document.createTextNode(c) : c);
    });
    return node;
  }

  function render() {
    root.innerHTML = '';

    if (!state.started) {
      renderIntro();
      return;
    }

    root.appendChild(el('img', {
      class: 'bb-logo',
      src: 'logo.jpg',
      alt: 'A Cup of Ambition'
    }));

    var progress = el('div', { class: 'bb-progress' }, [
      el('div', { class: 'bb-progress__bar', style: 'width:' + progressPct() + '%' })
    ]);
    root.appendChild(progress);

    // Framing text shown only above the very first question
    if (!state.finalResult && !state.pendingResult && state.history.length === 0) {
      root.appendChild(el('p', { class: 'bb-framing' }, [
        'Bij A Cup of Ambition vertegenwoordigen we vrouwelijke sprekers en dagvoorzitters én geven we trainingen om vrouwen met meer plezier en zelfvertrouwen te leren presenteren. Veel mensen willen de stap maken naar betaald spreker. Tijdens deze test ontdekken we of jij klaar bent om die stap te maken.'
      ]));
    }

    var card = el('div', { class: 'bb-card' });
    if (state.finalResult)        renderResult(card, state.finalResult);
    else if (state.pendingResult) renderEmailGate(card);
    else                          renderQuestion(card);
    root.appendChild(card);
  }

  function renderIntro() {
    var wrap = el('div', { class: 'bb-intro' });

    wrap.appendChild(el('img', {
      class: 'bb-intro__photo',
      src: 'header.jpg',
      alt: 'Annick en Britt — Team A Cup of Ambition'
    }));

    wrap.appendChild(el('p', { class: 'bb-intro__hook' },
      ['MORE WOMEN ON STAGE, ook jij!']
    ));
    wrap.appendChild(el('p', { class: 'bb-intro__sub' },
      ['Ben jij er klaar voor om als betaald spreker geboekt te worden?']
    ));

    wrap.appendChild(el('button', {
      class: 'bb-intro__start',
      type: 'button',
      onclick: function () {
        state.started = true;
        render();
        window.scrollTo({ top: 0, behavior: 'smooth' });
      }
    }, ['Doe de test!']));

    root.appendChild(wrap);
  }

  function estimateRemainingFrom(nodeId) {
    // Walk the "longest path" forward (first answer = the path that keeps asking).
    var depth = 0;
    var current = TREE.nodes[nodeId];
    var seen = {};
    while (current && !seen[current === TREE.nodes[nodeId] ? nodeId : '']) {
      var nextStep = current.answers[0].next;
      if (typeof nextStep !== 'string' || nextStep.indexOf('result:') === 0) break;
      depth++;
      if (depth > 10) break; // safety
      current = TREE.nodes[nextStep];
    }
    return depth;
  }

  function renderQuestion(card) {
    var node = TREE.nodes[state.currentNodeId];
    var stepNum = state.history.length + 1;
    var estimatedTotal = stepNum + estimateRemainingFrom(state.currentNodeId);

    card.appendChild(el('div', { class: 'bb-eyebrow' },
      ['Vraag ' + stepNum + ' van ' + estimatedTotal]
    ));
    card.appendChild(el('h2', { class: 'bb-question' }, [node.question]));
    if (node.helper) card.appendChild(el('p', { class: 'bb-helper' }, [node.helper]));

    var answers = el('div', { class: 'bb-answers' });
    node.answers.forEach(function (a) {
      var btn = el('button', {
        class: 'bb-answer',
        type: 'button',
        onclick: function () { choose(a); }
      }, [a.label]);
      answers.appendChild(btn);
    });
    card.appendChild(answers);

    if (state.history.length > 0) {
      card.appendChild(el('button', {
        class: 'bb-back',
        type: 'button',
        onclick: goBack
      }, ['← Vorige vraag']));
    }
  }

  function renderEmailGate(card) {
    if (!REQUIRE_EMAIL) {
      // Skip the email step entirely
      state.finalResult = state.pendingResult;
      state.pendingResult = null;
      render();
      return;
    }

    card.appendChild(el('div', { class: 'bb-eyebrow' }, ['✓ Jouw uitslag staat klaar']));
    card.appendChild(el('h2', { class: 'bb-gate__title' }, ['Waar mogen we ’m naartoe sturen?']));
    card.appendChild(el('p', { class: 'bb-gate__intro' }, [
      'Vul je naam en e-mailadres in — je ziet direct je persoonlijke uitkomst én ontvangt een mailtje met passende vervolgstappen van A Cup of Ambition.'
    ]));

    var form = el('form', { class: 'bb-form', onsubmit: function (e) { e.preventDefault(); submit(form); } });

    var nameField = el('div', { class: 'bb-field' }, [
      el('label', { for: 'bb-name' }, ['Naam']),
      el('input', { type: 'text', id: 'bb-name', name: 'name', required: 'required', autocomplete: 'name', placeholder: 'Jouw naam' })
    ]);
    var emailField = el('div', { class: 'bb-field' }, [
      el('label', { for: 'bb-email' }, ['E-mailadres']),
      el('input', { type: 'email', id: 'bb-email', name: 'email', required: 'required', autocomplete: 'email', placeholder: 'jij@voorbeeld.nl' })
    ]);

    var consent = el('label', { class: 'bb-consent' }, [
      el('input', { type: 'checkbox', id: 'bb-consent', name: 'newsletter_optin' }),
      el('span', null, ['Ja, ik ontvang graag de nieuwsbrief van A Cup of Ambition met inspiratie en aanbiedingen. (Optioneel — afmelden kan altijd.)'])
    ]);

    var submitBtn = el('button', { class: 'bb-submit', type: 'submit' }, ['Toon mijn uitslag']);
    var error = el('div', { class: 'bb-error', id: 'bb-error' });
    var privacy = el('p', { class: 'bb-privacy' }, [
      '🔒 We sturen alleen jouw uitslag — geen spam, je e-mailadres blijft bij ons.'
    ]);

    form.appendChild(nameField);
    form.appendChild(emailField);
    form.appendChild(consent);
    form.appendChild(submitBtn);
    form.appendChild(privacy);
    form.appendChild(error);
    card.appendChild(form);

    card.appendChild(el('button', {
      class: 'bb-back',
      type: 'button',
      onclick: function () {
        // step back into the last question
        var last = state.history.pop();
        if (last) {
          state.currentNodeId = last.nodeId;
          state.pendingResult = null;
          render();
        }
      }
    }, ['← Vorige vraag']));
  }

  // Map each "gap" question (where user said no/maybe) to the most relevant
  // A Cup of Ambition service. First gap wins for the primary CTA.
  var GAP_CTAS = {
    q1: { lead: 'Jouw eerste stap: ontdekken wat jouw unieke verhaal is.',
          label: 'Bekijk de Sprekersopleiding',
          href:  'https://www.acupofambition.nl/opleiding' },
    q2: { lead: 'Jouw eerste stap: scherp krijgen of er vraag is naar jouw onderwerp en hoe je je positioneert.',
          label: 'Bekijk de Sprekersopleiding',
          href:  'https://www.acupofambition.nl/opleiding' },
    q3: { lead: 'Jouw eerste stap: een keynote bouwen waar je trots op bent.',
          label: 'Bouw 1:1 jouw killer keynote',
          href:  'https://www.acupofambition.nl/11-coaching' },
    q4: { lead: 'Jouw eerste stap: zelfvertrouwen en plezier op het podium opbouwen.',
          label: 'Bekijk de Sprekersopleiding',
          href:  'https://www.acupofambition.nl/opleiding' },
    q5: { lead: 'Jouw eerste stap: ervaring opdoen en bewijs van waarde verzamelen.',
          label: 'Bekijk het LEVEL UP traject',
          href:  'https://www.acupofambition.nl/alle-trainingen1' },
    q6: { lead: 'Jouw eerste stap: consistent zichtbaar worden als spreker.',
          label: 'Bekijk het LEVEL UP traject',
          href:  'https://www.acupofambition.nl/alle-trainingen1' },
    q_explore: { lead: 'Jouw eerste stap: onderzoeken wat jouw unieke verhaal is.',
          label: 'Bekijk de Sprekersopleiding',
          href:  'https://www.acupofambition.nl/opleiding' }
  };

  function buildTailoredCtas() {
    // Find the first non-yes answer in the user's history
    var firstGap = null;
    for (var i = 0; i < state.history.length; i++) {
      var h = state.history[i];
      if (h.answerLabel !== 'Ja') { firstGap = h.nodeId; break; }
    }
    var match = firstGap && GAP_CTAS[firstGap];
    if (!match) return null;
    return {
      lead: match.lead,
      ctas: [
        { label: match.label, href: match.href, primary: true },
        { label: 'Alle opleidingen bekijken', href: 'https://www.acupofambition.nl/alle-trainingen1', primary: false }
      ]
    };
  }

  function renderResult(card, key) {
    var r = RESULTS[key];
    card.appendChild(el('div', { class: 'bb-result__badge' }, [r.badge]));
    card.appendChild(el('h2', { class: 'bb-result__title' }, [r.title]));
    var body = el('div', { class: 'bb-result__body' });
    r.body.forEach(function (p) {
      body.appendChild(el('p', { html: p }));
    });

    // Tailored "first step" callout for the work outcome
    var ctasToShow = r.ctas;
    if (key === 'work') {
      var tailored = buildTailoredCtas();
      if (tailored) {
        body.appendChild(el('p', { class: 'bb-result__lead', html: '<strong>' + tailored.lead + '</strong>' }));
        ctasToShow = tailored.ctas;
      }
    }

    if (r.list) {
      var ul = el('ul', { class: 'bb-result__list' });
      r.list.forEach(function (li) { ul.appendChild(el('li', { html: li })); });
      body.appendChild(ul);
    }
    card.appendChild(body);

    ctasToShow.forEach(function (cta) {
      card.appendChild(el('a', {
        class: 'bb-result__cta' + (cta.primary ? '' : ' bb-result__cta--ghost'),
        href: cta.href,
        target: '_blank',
        rel: 'noopener'
      }, [cta.label]));
    });

    card.appendChild(el('button', {
      class: 'bb-restart',
      type: 'button',
      onclick: restart
    }, ['Opnieuw beginnen']));

    // 🎉 Confetti for the "ready" outcome
    if (key === 'ready') {
      setTimeout(fireConfetti, 200);
    }
  }

  // ====================================================================
  // Actions
  // ====================================================================
  function choose(answer) {
    state.history.push({ nodeId: state.currentNodeId, answerLabel: answer.label });
    if (typeof answer.next === 'string' && answer.next.indexOf('result:') === 0) {
      state.pendingResult = answer.next.split(':')[1];
    } else {
      state.currentNodeId = answer.next;
    }
    render();
  }

  function goBack() {
    var last = state.history.pop();
    if (!last) return;
    state.currentNodeId = last.nodeId;
    state.pendingResult = null;
    render();
  }

  function restart() {
    state.started = false;
    state.history = [];
    state.currentNodeId = TREE.start;
    state.pendingResult = null;
    state.finalResult = null;
    render();
  }

  function submit(form) {
    var btn = form.querySelector('.bb-submit');
    var err = form.querySelector('#bb-error');
    err.textContent = '';

    var nameVal  = (form.querySelector('#bb-name')  || {}).value || '';
    var emailVal = (form.querySelector('#bb-email') || {}).value || '';
    var newsletterChecked = !!(form.querySelector('#bb-consent') && form.querySelector('#bb-consent').checked);
    var outcomeTag = RESULTS[state.pendingResult].tag;

    btn.disabled = true;
    btn.textContent = 'Bezig...';

    // Build POST body for ActiveCampaign's proc.php endpoint.
    // The hidden form fields (u, f, s, c, m, act, v, or) come straight from
    // the AC-generated form snippet — they identify which form/list to
    // attach the contact to.
    var data = new FormData();
    Object.keys(AC_FORM).forEach(function (k) { data.append(k, AC_FORM[k]); });
    data.append('fullname', nameVal.trim());
    data.append('email', emailVal.trim());
    data.append(AC_OUTCOME_FIELD, outcomeTag);

    // AC tag-list. Always include a generic source-tag, the outcome-tag
    // (klaar / werk-aan-de-winkel / nog-niet-klaar), and "nieuwsbrief"
    // when the user actively opted in. Britt's automations can trigger on
    // any of these.
    var tags = ['beslisboom-lead', outcomeTag];
    if (newsletterChecked) tags.push('nieuwsbrief');
    data.append('tags', tags.join(','));

    // Keep the boolean opt-in as a free-form field too, in case Britt
    // wants to wire it up to a custom field later.
    data.append('newsletter_optin', newsletterChecked ? 'yes' : 'no');

    // AC's proc.php doesn't return CORS headers, so we use no-cors mode.
    // Fire-and-forget: fetch resolves on network success regardless of
    // response status. AC validates server-side; the user sees their
    // outcome immediately. If the network itself fails (offline etc.),
    // .catch fires and we surface a friendly error.
    fetch(AC_ENDPOINT, {
      method: 'POST',
      mode: 'no-cors',
      body: data
    }).then(function () {
      state.finalResult = state.pendingResult;
      state.pendingResult = null;
      render();
    }).catch(function (e) {
      console.error('[beslisboom] AC submit failed', e);
      btn.disabled = false;
      btn.textContent = 'Toon mijn uitslag';
      err.textContent = 'Er ging iets mis. Probeer het nog eens of mail ons direct via info@acupofambition.nl.';
    });
  }

  // ====================================================================
  // 🎉 Confetti — tiny canvas burst, brand colours, runs ~2.5s
  // ====================================================================
  function fireConfetti() {
    var canvas = document.createElement('canvas');
    canvas.className = 'bb-confetti';
    document.body.appendChild(canvas);
    var ctx = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth  * window.devicePixelRatio;
      canvas.height = window.innerHeight * window.devicePixelRatio;
      canvas.style.width  = window.innerWidth + 'px';
      canvas.style.height = window.innerHeight + 'px';
      ctx.scale(window.devicePixelRatio, window.devicePixelRatio);
    }
    resize();

    var colors = ['#5c1f1a', '#c8923b', '#b89691', '#f5e8e4', '#3f120e'];
    var pieces = [];
    var w = window.innerWidth, h = window.innerHeight;
    for (var i = 0; i < 140; i++) {
      pieces.push({
        x: w / 2 + (Math.random() - 0.5) * 100,
        y: h / 3,
        vx: (Math.random() - 0.5) * 14,
        vy: -Math.random() * 14 - 4,
        g: 0.35 + Math.random() * 0.15,
        size: 6 + Math.random() * 8,
        rot: Math.random() * Math.PI * 2,
        vr: (Math.random() - 0.5) * 0.4,
        color: colors[Math.floor(Math.random() * colors.length)],
        shape: Math.random() < 0.5 ? 'rect' : 'circ'
      });
    }

    var start = performance.now();
    var DURATION = 2600;

    function frame(t) {
      var elapsed = t - start;
      ctx.clearRect(0, 0, w, h);
      pieces.forEach(function (p) {
        p.vy += p.g;
        p.x += p.vx;
        p.y += p.vy;
        p.rot += p.vr;
        ctx.save();
        ctx.translate(p.x, p.y);
        ctx.rotate(p.rot);
        ctx.fillStyle = p.color;
        ctx.globalAlpha = Math.max(0, 1 - elapsed / DURATION);
        if (p.shape === 'rect') {
          ctx.fillRect(-p.size / 2, -p.size / 2, p.size, p.size * 0.5);
        } else {
          ctx.beginPath();
          ctx.arc(0, 0, p.size / 2, 0, Math.PI * 2);
          ctx.fill();
        }
        ctx.restore();
      });
      if (elapsed < DURATION) {
        requestAnimationFrame(frame);
      } else {
        canvas.remove();
      }
    }
    requestAnimationFrame(frame);
  }

  render();
})();
</script>
